name: smart_funkos
description: SmartFunko mobile client.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  dio: ^5.8.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  intl: ^0.20.2
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.8
  json_serializable: ^6.8.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#020817"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  web:
    generate: true
    image_path: assets/branding/app_icon.png
    background_color: "#020817"
    theme_color: "#020817"

flutter_native_splash:
  color: "#020817"
  image: assets/branding/logo_horizontal_white.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#020817"
    image: assets/branding/splash_android12.png
